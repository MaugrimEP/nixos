###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

# --- Core actions ---
bind = $mainMod, T, exec, $terminal                                                                          # Open terminal
bind = $mainMod, D, exec, $menu                                                                              # App launcher
bind = $mainMod SHIFT, Slash, exec, hyprland-binds                                                           # Hotkey overlay
bind = $mainMod, Q, killactive,                                                                              # Close window
bind = $mainMod SHIFT, E, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit  # Exit session
bind = $mainMod ALT, L, exec, hyprlock                                                                       # Lock screen
bind = $mainMod, E, exec, $fileManager                                                                       # File manager
bind = $mainMod, V, togglefloating,                                                                          # Toggle floating
bind = $mainMod, F, fullscreen, 1                                                                            # Maximize
bind = $mainMod SHIFT, F, fullscreen, 0                                                                      # True fullscreen
bind = $mainMod, C, centerwindow,                                                                            # Center window
bind = $mainMod, P, pseudo,                                                                                  # Dwindle pseudo

# --- Resize ---
bind = $mainMod, Minus, resizeactive, -10% 0
bind = $mainMod, Equal, resizeactive, 10% 0
bind = $mainMod SHIFT, Minus, resizeactive, 0 -10%
bind = $mainMod SHIFT, Equal, resizeactive, 0 10%

# --- Focus navigation ---
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d
bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, r

# --- Move windows ---
bind = $mainMod CTRL, left,  movewindow, l
bind = $mainMod CTRL, right, movewindow, r
bind = $mainMod CTRL, up,    movewindow, u
bind = $mainMod CTRL, down,  movewindow, d
bind = $mainMod CTRL, H, movewindow, l
bind = $mainMod CTRL, J, movewindow, d
bind = $mainMod CTRL, K, movewindow, u
bind = $mainMod CTRL, L, movewindow, r

# --- Focus monitor ---
bind = $mainMod SHIFT, left,  focusmonitor, l
bind = $mainMod SHIFT, right, focusmonitor, r
bind = $mainMod SHIFT, up,    focusmonitor, u
bind = $mainMod SHIFT, down,  focusmonitor, d
bind = $mainMod SHIFT, H, focusmonitor, l
bind = $mainMod SHIFT, J, focusmonitor, d
bind = $mainMod SHIFT, K, focusmonitor, u
bind = $mainMod SHIFT, L, focusmonitor, r

# --- Move window to monitor ---
bind = $mainMod SHIFT CTRL, left,  movewindow, mon:l
bind = $mainMod SHIFT CTRL, right, movewindow, mon:r
bind = $mainMod SHIFT CTRL, up,    movewindow, mon:u
bind = $mainMod SHIFT CTRL, down,  movewindow, mon:d
bind = $mainMod SHIFT CTRL, H, movewindow, mon:l
bind = $mainMod SHIFT CTRL, J, movewindow, mon:d
bind = $mainMod SHIFT CTRL, K, movewindow, mon:u
bind = $mainMod SHIFT CTRL, L, movewindow, mon:r

# --- Workspace navigation ---
bind = $mainMod, Page_Down, workspace, e+1
bind = $mainMod, Page_Up,   workspace, e-1
bind = $mainMod, U, workspace, e+1
bind = $mainMod, I, workspace, e-1

# --- Move window to adjacent workspace ---
bind = $mainMod CTRL, Page_Down, movetoworkspace, e+1
bind = $mainMod CTRL, Page_Up,   movetoworkspace, e-1
bind = $mainMod CTRL, U, movetoworkspace, e+1
bind = $mainMod CTRL, I, movetoworkspace, e-1

# --- Switch workspaces by number ---
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# --- Move window to workspace by number ---
bind = $mainMod CTRL, 1, movetoworkspace, 1
bind = $mainMod CTRL, 2, movetoworkspace, 2
bind = $mainMod CTRL, 3, movetoworkspace, 3
bind = $mainMod CTRL, 4, movetoworkspace, 4
bind = $mainMod CTRL, 5, movetoworkspace, 5
bind = $mainMod CTRL, 6, movetoworkspace, 6
bind = $mainMod CTRL, 7, movetoworkspace, 7
bind = $mainMod CTRL, 8, movetoworkspace, 8
bind = $mainMod CTRL, 9, movetoworkspace, 9

# --- Special workspace (scratchpad) ---
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# --- Mouse workspace/window control ---
bind  = $mainMod, mouse_down, workspace, e+1
bind  = $mainMod, mouse_up,   workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --- Screenshots ---
bind = , Print,      exec, hyprshot -m region -o ~/Pictures/Screenshots
bind = CTRL, Print,  exec, hyprshot -m output -o ~/Pictures/Screenshots
bind = ALT,  Print,  exec, hyprshot -m window -o ~/Pictures/Screenshots

# --- Media keys ---
bindel = ,XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp,   exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPrev,  exec, playerctl previous
