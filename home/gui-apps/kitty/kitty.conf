# Mouse.
mouse_hide_wait         -1.0
show_hyperlink_targets  yes
strip_trailing_spaces   smart
focus_follows_mouse     yes
copy_on_select          yes

# Terminal bell.
enable_audio_bell       no
visual_bell_duration    0.3
visual_bell_color       #000000

# Layout.
remember_window_size    no
startup_session         launch.conf
enabled_layouts         tall,fat,grid,splits
draw_minimal_borders    yes
window_border_width     0.2pt
window_padding_width    0.0
hide_window_decorations yes

# Tab bar.
tab_bar_style           slant
tab_title_max_length    20

# Color scheme.
background_opacity      0.85
dynamic_background_opacity yes
cursor_shape            block
cursor_blink_interval   0

# Cursor trail.
cursor_trail            1
cursor_trail_decay      0.1 0.3
cursor_trail_start_threshold 0

# Advanced.
shell                   .
editor                  nvim
close_on_child_death    yes
shell_integration       no-cursor
allow_cloning           ask
clone_source_strategies venv,conda,env_var,path
allow_remote_control    yes
listen_on               unix:@kitty
sync_to_monitor         no

# Wayland.
wayland_titlebar_color  system

# Keybindings.
kitty_mod               ctrl+shift
clear_all_shortcuts     yes

# Clipboard.
map kitty_mod+c         copy_to_clipboard
map kitty_mod+v         paste_from_clipboard

# Scrolling.
map kitty_mod+up        scroll_line_up
map kitty_mod+down      scroll_line_down
map kitty_mod+u         scroll_page_up
map kitty_mod+d         scroll_page_down
map kitty_mod+home      scroll_home
map kitty_mod+end       scroll_end
map kitty_mod+z         scroll_to_prompt -1
map kitty_mod+x         scroll_to_prompt 1
map kitty_mod+g         show_last_command_output

# Window management.
map kitty_mod+enter     launch --cwd=current
map ctrl+alt+enter      new_window
map kitty_mod+n         new_os_window
map kitty_mod+k         neighboring_window up
map kitty_mod+j         neighboring_window down
map kitty_mod+h         neighboring_window left
map kitty_mod+l         neighboring_window right
map kitty_mod+r         start_resizing_window

# Tab management.
map kitty_mod+t         new_tab_with_cwd
map ctrl+tab            next_tab
map ctrl+shift+tab      previous_tab
map kitty_mod+q         close_tab
map kitty_mod+,         set_tab_title
map kitty_mod+1         goto_tab 1
map kitty_mod+2         goto_tab 2
map kitty_mod+3         goto_tab 3
map kitty_mod+4         goto_tab 4
map kitty_mod+5         goto_tab 5
map kitty_mod+6         goto_tab 6
map kitty_mod+7         goto_tab 7
map kitty_mod+8         goto_tab 8
map kitty_mod+9         goto_tab 9

# Layout.
map kitty_mod+z         toggle_layout stack

# Font sizes.
map kitty_mod+equal     change_font_size all +1.0
map kitty_mod+plus      change_font_size all +1.0
map kitty_mod+minus     change_font_size all -1.0

# Misc.
map kitty_mod+escape    kitty_shell window
map kitty_mod+del       clear_terminal reset all
map kitty_mod+e         open_url_with_hints
map kitty_mod+i         kitten unicode_input
map f10                 toggle_maximized
map f11                 toggle_fullscreen
